<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Rentabilidad</title>
    <!-- Tailwind CSS para Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Componente Icono (Wrapper para Lucide)
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svg = window.lucide.createIcons();
                    }
                }
            }, [name]);

            // Fallback simple usando SVGs de Lucide comunes
            const icons = {
                TrendingUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>,
                ShoppingCart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>,
                Percent: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="8" r="3"></circle><circle cx="16" cy="16" r="3"></circle><line x1="16" y1="8" x2="8" y2="16"></line></svg>,
                BarChart3: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"></path><path d="M18 17V9"></path><path d="M13 17V5"></path><path d="M8 17v-3"></path></svg>,
                Plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                Trash2: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
                Layers: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>,
                Info: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
                Package: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7.5 4.27 9 5.15"></path><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22.5V12"></path></svg>
            };

            return icons[name] || null;
        };

        const App = () => {
            const [baseCost, setBaseCost] = useState(1000);
            const [quantity, setQuantity] = useState(1);
            const [ivaRate] = useState(21);
            const [iibbRate] = useState(3);
            const [commissionRate, setCommissionRate] = useState(10);
            const [commissionType, setCommissionType] = useState('net');
            const [profitScenarios, setProfitScenarios] = useState([10, 20, 30, 50]);
            const [newScenario, setNewScenario] = useState('');

            const unitTaxedCost = useMemo(() => {
                const ivaAmount = baseCost * (ivaRate / 100);
                const iibbAmount = baseCost * (iibbRate / 100);
                return baseCost + ivaAmount + iibbAmount;
            }, [baseCost, ivaRate, iibbRate]);

            const totalInvestment = useMemo(() => {
                return unitTaxedCost * quantity;
            }, [unitTaxedCost, quantity]);

            const calculateScenario = (profitPercentage) => {
                const desiredProfitPerUnit = baseCost * (profitPercentage / 100);
                const costPlusProfitPerUnit = unitTaxedCost + desiredProfitPerUnit;
                let unitSalePrice = 0;
                let unitCommission = 0;

                if (commissionType === 'net') {
                    unitCommission = baseCost * (commissionRate / 100);
                    unitSalePrice = costPlusProfitPerUnit + unitCommission;
                } else {
                    const commissionFactor = commissionRate / 100;
                    unitSalePrice = costPlusProfitPerUnit / (1 - commissionFactor);
                    unitCommission = unitSalePrice * commissionFactor;
                }

                const totalSaleValue = unitSalePrice * quantity;
                const totalCommission = unitCommission * quantity;
                const totalNetProfit = totalSaleValue - totalInvestment - totalCommission;
                const marginOnSale = (totalNetProfit / totalSaleValue) * 100;

                return {
                    profitPercentage,
                    unitSalePrice,
                    totalSaleValue,
                    unitCommission,
                    totalCommission,
                    totalNetProfit,
                    marginOnSale
                };
            };

            const results = useMemo(() => {
                return profitScenarios
                    .sort((a, b) => a - b)
                    .map(scenario => calculateScenario(scenario));
            }, [unitTaxedCost, totalInvestment, commissionRate, commissionType, profitScenarios, baseCost, quantity]);

            const addScenario = () => {
                const val = parseFloat(newScenario);
                if (!isNaN(val) && !profitScenarios.includes(val)) {
                    setProfitScenarios([...profitScenarios, val]);
                    setNewScenario('');
                }
            };

            const removeScenario = (val) => {
                setProfitScenarios(profitScenarios.filter(s => s !== val));
            };

            const FormatCurrency = ({ value }) => (
                <span className="font-mono font-medium">
                    ${value.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                </span>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-900">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="TrendingUp" className="text-blue-600" size={32} />
                                    Calculadora de Rentabilidad
                                </h1>
                                <p className="text-slate-500">Analiza costos unitarios y proyección por volumen.</p>
                            </div>
                            <div className="bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-lg flex flex-col items-end">
                                <span className="text-xs opacity-80 uppercase font-bold tracking-wider">Inversión Total del Lote</span>
                                <div className="text-2xl font-bold"><FormatCurrency value={totalInvestment} /></div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <aside className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-blue-600">
                                        <Icon name="ShoppingCart" />
                                        Producto y Volumen
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm text-slate-500 mb-1">Costo Unitario (Neto)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                                                <input 
                                                    type="number" 
                                                    value={baseCost}
                                                    onChange={(e) => setBaseCost(Math.max(0, parseFloat(e.target.value) || 0))}
                                                    className="w-full pl-8 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-500 mb-1">Cantidad de Productos</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="Layers" size={16}/></span>
                                                <input 
                                                    type="number" 
                                                    value={quantity}
                                                    onChange={(e) => setQuantity(Math.max(1, parseInt(e.target.value) || 1))}
                                                    className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-purple-600">
                                        <Icon name="Percent" />
                                        Comisiones de Venta
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm text-slate-500 mb-1">Porcentaje de Comisión</label>
                                            <div className="relative">
                                                <input 
                                                    type="number" 
                                                    value={commissionRate}
                                                    onChange={(e) => setCommissionRate(Math.max(0, parseFloat(e.target.value) || 0))}
                                                    className="w-full pr-8 pl-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none transition-all"
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">%</span>
                                            </div>
                                        </div>
                                        <div className="flex bg-slate-50 p-1 rounded-xl border border-slate-200">
                                            <button 
                                                onClick={() => setCommissionType('net')}
                                                className={`flex-1 py-1.5 px-3 rounded-lg text-sm transition-all ${commissionType === 'net' ? 'bg-white shadow-sm text-purple-600 font-bold' : 'text-slate-500'}`}
                                            >Neto</button>
                                            <button 
                                                onClick={() => setCommissionType('gross')}
                                                className={`flex-1 py-1.5 px-3 rounded-lg text-sm transition-all ${commissionType === 'gross' ? 'bg-white shadow-sm text-purple-600 font-bold' : 'text-slate-500'}`}
                                            >Bruto</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-emerald-600">
                                        <Icon name="BarChart3" />
                                        Márgenes (%)
                                    </h2>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {profitScenarios.map(s => (
                                            <span key={s} className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 border border-emerald-100">
                                                {s}%
                                                <button onClick={() => removeScenario(s)} className="hover:text-red-500"><Icon name="Trash2" size={12} /></button>
                                            </span>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input 
                                            type="number" 
                                            placeholder="Ej: 45"
                                            value={newScenario}
                                            onChange={(e) => setNewScenario(e.target.value)}
                                            className="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none"
                                        />
                                        <button onClick={addScenario} className="p-2 bg-emerald-500 text-white rounded-xl"><Icon name="Plus" /></button>
                                    </div>
                                </div>
                            </aside>

                            <main className="lg:col-span-8 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Costo Neto Lote</h3>
                                        <p className="text-2xl font-bold"><FormatCurrency value={baseCost * quantity} /></p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <h3 className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Impuestos Lote</h3>
                                        <p className="text-2xl font-bold text-red-500"><FormatCurrency value={(unitTaxedCost - baseCost) * quantity} /></p>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-b-4 border-b-blue-500">
                                        <h3 className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Inversión Total</h3>
                                        <p className="text-2xl font-bold text-blue-600"><FormatCurrency value={totalInvestment} /></p>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {results.map((res) => (
                                        <div key={res.profitPercentage} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 group relative overflow-hidden">
                                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500"></div>
                                            <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-center">
                                                <div className="md:col-span-3 flex items-center gap-4">
                                                    <div className="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 font-bold text-lg">{res.profitPercentage}%</div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800">Sugerido</h4>
                                                        <p className="text-lg font-bold text-slate-900"><FormatCurrency value={res.unitSalePrice} /></p>
                                                    </div>
                                                </div>
                                                <div className="md:col-span-5 space-y-3">
                                                    <div className="flex justify-between items-end">
                                                        <span className="text-xs text-slate-500">Venta Lote:</span>
                                                        <span className="text-xl font-bold"><FormatCurrency value={res.totalSaleValue} /></span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden flex">
                                                        <div className="bg-blue-400 h-full" style={{ width: `${(totalInvestment / res.totalSaleValue) * 100}%` }}></div>
                                                        <div className="bg-emerald-400 h-full" style={{ width: `${(res.totalNetProfit / res.totalSaleValue) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                                <div className="md:col-span-4 bg-emerald-50 p-4 rounded-2xl text-right">
                                                    <p className="text-[10px] text-emerald-600 mb-1 uppercase font-black">Ganancia Neta Lote</p>
                                                    <p className="text-2xl font-black text-emerald-700"><FormatCurrency value={res.totalNetProfit} /></p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
